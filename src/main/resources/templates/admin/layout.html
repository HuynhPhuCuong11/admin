<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<!--/* ========================================================
     FRAGMENT: head-styles
     Dùng: <th:block th:replace="~{admin/layout :: head-styles}">
   ======================================================== */-->
<th:block th:fragment="head-styles">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f4f6f9;color:#333;display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:240px;background:#1e2a38;color:#cdd5e0;min-height:100vh;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 24px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid #2e3f52}
.sidebar-brand span{color:#4e9af1}
.sidebar nav{flex:1;padding:12px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 24px;color:#b0bec5;text-decoration:none;font-size:14px;transition:background .15s,color .15s}
.sidebar nav a:hover,.sidebar nav a.active{background:#2e3f52;color:#fff}
.sidebar nav a .icon{font-size:16px;width:20px;text-align:center}
.sidebar nav .group-label{padding:16px 24px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#546e7a}
.sidebar-footer{padding:16px 24px;border-top:1px solid #2e3f52;font-size:13px;color:#546e7a}
.sidebar-footer a{color:#ef5350;text-decoration:none}
/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:14px 28px;border-bottom:1px solid #e0e4ea;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:600}
.topbar .admin-info{font-size:13px;color:#666}
.content{flex:1;padding:28px;overflow-y:auto}
/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;flex-direction:column;gap:6px}
.stat-card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.stat-card .value{font-size:28px;font-weight:700;color:#1e2a38}
.stat-card .sub{font-size:12px;color:#aaa}
.stat-card.blue .value{color:#1976d2}
.stat-card.green .value{color:#388e3c}
.stat-card.amber .value{color:#f57c00}
.stat-card.red .value{color:#d32f2f}
/* CARD */
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:20px}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;color:#1e2a38;display:flex;align-items:center;justify-content:space-between}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#f8fafc;border-bottom:2px solid #e0e4ea;padding:10px 12px;text-align:left;font-weight:600;color:#555;white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tbody tr:hover{background:#fafbfc}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input[type=text]{padding:8px 12px;border:1px solid #dde1e7;border-radius:6px;font-size:14px;width:260px}
.toolbar input[type=text]:focus{outline:none;border-color:#4e9af1}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#1976d2;color:#fff}
.btn-success{background:#388e3c;color:#fff}
.btn-warning{background:#f57c00;color:#fff}
.btn-danger{background:#d32f2f;color:#fff}
.btn-secondary{background:#e0e4ea;color:#333}
.btn-sm{padding:4px 10px;font-size:12px}
/* FORM */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#444}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #dde1e7;border-radius:6px;font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#4e9af1}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-actions{display:flex;gap:10px;margin-top:8px}
/* ALERT */
.alert{padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:16px}
.alert-success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.alert-error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-success{background:#e8f5e9;color:#388e3c}
.badge-warning{background:#fff8e1;color:#f57c00}
.badge-danger{background:#ffebee;color:#d32f2f}
/* PAGINATION */
.pagination{display:flex;gap:6px;margin-top:16px;align-items:center;flex-wrap:wrap}
.pagination a,.pagination span{padding:6px 12px;border-radius:5px;font-size:13px;text-decoration:none;border:1px solid #e0e4ea;background:#fff;color:#333}
.pagination .current{background:#1976d2;color:#fff;border-color:#1976d2}
.pagination a:hover{background:#f0f4f8}
/* MODAL CONFIRM */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:10px;padding:28px;max-width:400px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.15)}
.modal-box h3{font-size:16px;margin-bottom:10px}
.modal-box p{font-size:14px;color:#666;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
/* INLINE TABLE FORM */
.inline-tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.inline-tag{display:inline-flex;align-items:center;gap:6px;background:#e3f2fd;color:#1565c0;padding:4px 10px;border-radius:20px;font-size:13px}
.inline-tag form{display:inline}
.inline-tag button{background:none;border:none;cursor:pointer;color:#e53935;font-size:14px;line-height:1;padding:0}
</style>
</th:block>

<!--/* ========================================================
     FRAGMENT: sidebar
     Dùng: <th:block th:replace="~{admin/layout :: sidebar(activePage='products')}">
   ======================================================== */-->
<th:block th:fragment="sidebar(activePage)">
<div class="sidebar">
  <div class="sidebar-brand">🥤 <span>Trà Sữa</span> Admin</div>
  <nav>
    <div class="group-label">Tổng quan</div>
    <a th:href="@{/admin/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
      <span class="icon">📊</span> Dashboard
    </a>
    <div class="group-label">Sản phẩm</div>
    <a th:href="@{/admin/products}" th:classappend="${activePage == 'products'} ? ' active' : ''">
      <span class="icon">🧋</span> Danh sách SP
    </a>
    <a th:href="@{/admin/products/colors}" th:classappend="${activePage == 'colors'} ? ' active' : ''">
      <span class="icon">🎨</span> Màu sắc
    </a>
    <a th:href="@{/admin/products/sizes}" th:classappend="${activePage == 'sizes'} ? ' active' : ''">
      <span class="icon">📏</span> Size
    </a>
    <div class="group-label">Khách hàng</div>
    <a th:href="@{/admin/customers}" th:classappend="${activePage == 'customers'} ? ' active' : ''">
      <span class="icon">👥</span> Khách hàng
    </a>
  </nav>
  <div class="sidebar-footer">
    <span th:text="${session.username != null ? session.username : 'Admin'}">Admin</span>
    &nbsp;|&nbsp;<a th:href="@{/admin/logout}">Đăng xuất</a>
  </div>
</div>
</th:block>

<!--/* ========================================================
     FRAGMENT: topbar
   ======================================================== */-->
<th:block th:fragment="topbar(pageTitle)">
<div class="topbar">
  <h1 th:text="${pageTitle}">Admin</h1>
  <div class="admin-info">🔒 Quản trị viên</div>
</div>
</th:block>

<!--/* ========================================================
     FRAGMENT: flash-messages
   ======================================================== */-->
<th:block th:fragment="flash-messages">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
</th:block>

<!--/* ========================================================
     FRAGMENT: pagination
   ======================================================== */-->
<th:block th:fragment="pagination(currentPage, totalPages, baseUrl, keyword)">
<div class="pagination" th:if="${totalPages > 1}">
  <a th:if="${currentPage > 0}"
     th:href="@{${baseUrl}(page=${currentPage - 1}, keyword=${keyword})}">&laquo; Trước</a>
  <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
    <span th:if="${i == currentPage}" class="current" th:text="${i + 1}">1</span>
    <a th:if="${i != currentPage}"
       th:href="@{${baseUrl}(page=${i}, keyword=${keyword})}"
       th:text="${i + 1}">1</a>
  </th:block>
  <a th:if="${currentPage < totalPages - 1}"
     th:href="@{${baseUrl}(page=${currentPage + 1}, keyword=${keyword})}">Sau &raquo;</a>
</div>
</th:block>

</html>
