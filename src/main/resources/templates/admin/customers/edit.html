<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sửa khách hàng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}"/>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">🥤 <span>Trà Sữa</span> Admin</div>
    <nav>
        <div class="group-label">Tổng quan</div>
        <a th:href="@{/admin/dashboard}"><span class="icon">📊</span> Dashboard</a>
        <div class="group-label">Sản phẩm</div>
        <a th:href="@{/admin/products}"><span class="icon">🧋</span> Sản phẩm</a>
        <a th:href="@{/admin/products/colors}"><span class="icon">🎨</span> Màu sắc</a>
        <a th:href="@{/admin/products/sizes}"><span class="icon">📏</span> Size</a>
        <div class="group-label">Khách hàng</div>
        <a th:href="@{/admin/customers}" class="active"><span class="icon">👥</span> Khách hàng</a>
    </nav>
    <div class="sidebar-footer">
        <span th:text="${session.username}">Admin</span> &nbsp;|&nbsp;
        <form th:action="@{/admin/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background:none;border:none;color:inherit;cursor:pointer;padding:0;font:inherit;">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="main-wrap">
    <div class="topbar">
        <h1>✏ Sửa thông tin khách hàng</h1>
        <div class="admin-info">🔒 Chế độ quản trị</div>
    </div>
    <div class="content">

        <div th:if="${error}" class="alert alert-error">❌ <span th:text="${error}"></span></div>

        <div class="card" style="max-width:640px;">
            <div class="card-title">📋 Thông tin khách hàng
                <span style="font-size:12px;font-weight:400;color:#888;" th:text="'(ID: ' + ${customer.makh} + ')'"></span>
            </div>

            <form th:action="@{'/admin/customers/edit/' + ${customer.makh}}" method="post">

                <!-- Username (chỉ đọc, không cho sửa) -->
                <div class="form-group">
                    <label>Username (không thể thay đổi)</label>
                    <input type="text" th:value="${customer.username}" disabled style="background:#f5f5f5;color:#888;"/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tenkh">Họ và tên <span style="color:#d32f2f;">*</span></label>
                        <input type="text" id="tenkh" name="tenkh" required
                               th:value="${customer.tenkh}" placeholder="Nguyễn Văn A"/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email <span style="color:#d32f2f;">*</span></label>
                        <input type="email" id="email" name="email" required
                               th:value="${customer.email}" placeholder="email@example.com"/>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="sodienthoai">Số điện thoại</label>
                        <input type="text" id="sodienthoai" name="sodienthoai"
                               th:value="${customer.sodienthoai}" placeholder="0901234567"/>
                    </div>
                    <div class="form-group">
                        <!-- trống để lấp chỗ trong grid -->
                    </div>
                </div>

                <div class="form-group">
                    <label for="diachi">Địa chỉ</label>
                    <textarea id="diachi" name="diachi" rows="3"
                              th:text="${customer.diachi}" placeholder="Số nhà, đường, quận/huyện, tỉnh/thành..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">💾 Lưu thay đổi</button>
                    <a th:href="@{/admin/customers}" class="btn btn-secondary">↩ Quay lại</a>
                </div>
            </form>

            <!-- RESET MẬT KHẨU (tách riêng) -->
            <hr style="margin:28px 0;border:none;border-top:1px solid #eee;"/>
            <div class="card-title" style="color:#e65100;">🔑 Đặt lại mật khẩu</div>
            <p style="font-size:13px;color:#888;margin-bottom:14px;">
                Admin có thể đặt lại mật khẩu mới cho khách hàng này.
            </p>
            <form th:action="@{'/admin/customers/reset-password/' + ${customer.makh}}" method="post"
                  style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
                <div class="form-group" style="margin:0;flex:1;min-width:180px;">
                    <label for="newPassword">Mật khẩu mới (tối thiểu 6 ký tự)</label>
                    <input type="password" id="newPassword" name="newPassword" minlength="6" required
                           placeholder="Nhập mật khẩu mới..."/>
                </div>
                <button type="submit" class="btn btn-warning" style="flex-shrink:0;">🔑 Đặt lại</button>
            </form>
        </div>

    </div>
</div>
</body>
</html>
