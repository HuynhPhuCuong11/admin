<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Danh mục</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card" style="max-width:680px">
                <div class="card-header">
                    <span class="card-title" th:text="${pageTitle}">Danh mục</span>
                    <a th:href="@{/admin/categories}" class="btn btn-outline btn-sm">← Quay lại</a>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/save}" method="post">
                        <input type="hidden" th:name="id" th:value="${category.id}">

                        <div class="form-grid">
                            <div class="form-group full">
                                <label class="form-label">Tên danh mục *</label>
                                <input type="text" name="name" class="form-control"
                                       th:value="${category.name}" required
                                       placeholder="Nhập tên danh mục..."
                                       oninput="autoSlug(this.value)">
                                <span class="invalid-feedback"
                                      th:if="${#fields.hasErrors('name')}"
                                      th:errors="*{name}"></span>
                            </div>

                            <div class="form-group full">
                                <label class="form-label">Slug</label>
                                <input type="text" name="slug" id="slugInput" class="form-control"
                                       th:value="${category.slug}"
                                       placeholder="tu-dong-tao-tu-ten...">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Danh mục cha</label>
                                <select name="parentId" class="form-control">
                                    <option value="">-- Không có (danh mục gốc) --</option>
                                    <option th:each="r : ${roots}"
                                            th:value="${r.id}"
                                            th:text="${r.name}"
                                            th:selected="${r.id == category.parentId}"></option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Thứ tự sắp xếp</label>
                                <input type="number" name="sortOrder" class="form-control"
                                       th:value="${category.sortOrder}" min="0">
                            </div>

                            <div class="form-group full">
                                <label class="form-label">Mô tả</label>
                                <textarea name="description" class="form-control" rows="3"
                                          placeholder="Mô tả danh mục..."
                                          th:text="${category.description}"></textarea>
                            </div>

                            <!-- Flash sale -->
                            <div class="form-group">
                                <label class="form-label">Loại giảm giá</label>
                                <select name="discountType" class="form-control">
                                    <option value="">Không có</option>
                                    <option value="percent" th:selected="${category.discountType == 'percent'}">Phần trăm (%)</option>
                                    <option value="fixed"   th:selected="${category.discountType == 'fixed'}">Số tiền cố định</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Giá trị giảm</label>
                                <input type="number" name="discountValue" class="form-control"
                                       th:value="${category.discountValue}" min="0">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Flash sale từ ngày</label>
                                <input type="datetime-local" name="discountStartDate" class="form-control"
                                       th:value="${category.discountStartDate != null ?
                                           #temporals.format(category.discountStartDate,'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Flash sale đến ngày</label>
                                <input type="datetime-local" name="discountEndDate" class="form-control"
                                       th:value="${category.discountEndDate != null ?
                                           #temporals.format(category.discountEndDate,'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>

                            <div class="form-group full">
                                <div class="form-check">
                                    <input type="checkbox" name="active" id="active"
                                           th:checked="${category.active == null or category.active}">
                                    <label for="active" class="form-label" style="margin:0">Hiển thị danh mục</label>
                                </div>
                            </div>
                        </div>

                        <div style="display:flex;gap:12px;margin-top:24px">
                            <button type="submit" class="btn btn-primary">💾 Lưu danh mục</button>
                            <a th:href="@{/admin/categories}" class="btn btn-secondary">↩ Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/admin.js}"></script>
<script>
    function autoSlug(val) {
        const slug = val.toLowerCase()
            .replace(/[àáạảãâầấậẩẫăằắặẳẵ]/g,'a')
            .replace(/[èéẹẻẽêềếệểễ]/g,'e')
            .replace(/[ìíịỉĩ]/g,'i')
            .replace(/[òóọỏõôồốộổỗơờớợởỡ]/g,'o')
            .replace(/[ùúụủũưừứựửữ]/g,'u')
            .replace(/[ỳýỵỷỹ]/g,'y')
            .replace(/đ/g,'d')
            .replace(/[^a-z0-9\s-]/g,'')
            .replace(/\s+/g,'-')
            .replace(/-+/g,'-')
            .replace(/^-|-$/g,'');
        document.getElementById('slugInput').value = slug;
    }
</script>
</body>
</html>
