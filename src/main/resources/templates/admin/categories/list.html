<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Danh mục</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Danh sách danh mục</span>
                    <a th:href="@{/admin/categories/create}" class="btn btn-primary btn-sm">➕ Thêm danh mục</a>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Tên danh mục</th>
                            <th>Slug</th>
                            <th>Danh mục cha</th>
                            <th>Thứ tự</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c, stat : ${categories}">
                            <td th:text="${stat.index + 1}">1</td>
                            <td>
                                <div style="display:flex;align-items:center;gap:8px">
                                    <span th:if="${c.parentId != null}"
                                          style="color:var(--text-muted);font-size:14px">↳</span>
                                    <span style="font-weight:500" th:text="${c.name}">Tên</span>
                                </div>
                            </td>
                            <td>
                                <code style="font-size:12px;color:var(--primary);background:rgba(79,134,247,0.08);padding:2px 7px;border-radius:4px"
                                      th:text="${c.slug}">slug</code>
                            </td>
                            <td th:text="${c.parent != null ? c.parent.name : '—'}">—</td>
                            <td th:text="${c.sortOrder}">0</td>
                            <td>
                                <form th:action="@{'/admin/categories/toggle/' + ${c.id}}" method="post" style="display:inline">
                                    <button type="submit" class="status-badge"
                                            th:classappend="${c.active ? 'status-active' : 'status-inactive'}"
                                            th:text="${c.active ? '✓ Hiển thị' : '✗ Ẩn'}"
                                            style="border:none;cursor:pointer;font-size:11.5px"></button>
                                </form>
                            </td>
                            <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy')}">—</td>
                            <td>
                                <div style="display:flex;gap:6px">
                                    <a th:href="@{'/admin/categories/edit/' + ${c.id}}"
                                       class="btn btn-sm btn-warning">✏️ Sửa</a>
                                    <form th:action="@{'/admin/categories/delete/' + ${c.id}}" method="post"
                                          onsubmit="return confirm('Xóa danh mục này?')">
                                        <button type="submit" class="btn btn-sm btn-danger">🗑 Xóa</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">
                                Chưa có danh mục nào
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
