<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đăng nhập - Trà Sữa Admin</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="emoji">🧋</span>
      <h2>Trà Sữa Admin</h2>
      <p>Đăng nhập để quản lý hệ thống</p>
    </div>
    <div th:if="${param.error}"  class="alert alert-danger"  style="margin-bottom:16px"><span>Email hoặc mật khẩu không đúng!</span></div>
    <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom:16px"><span>Đã đăng xuất thành công!</span></div>
    <form th:action="@{/admin/login}" method="post">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="admin@trasua.vn" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label">Mật khẩu</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px 0">
        Đăng nhập
      </button>
    </form>
  </div>
</div>
</body>
</html>
