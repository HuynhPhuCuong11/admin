<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Coupon</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Danh sách Coupon</span>
                    <a th:href="@{/admin/coupons/create}" class="btn btn-primary btn-sm">+ Thêm mới</a>
                </div>
                <div class="card-body" style="padding-bottom:0">
                    <div class="filter-bar">
                        <form method="get" th:action="@{/admin/coupons}">
                            <input type="text" name="keyword" class="search-input"
                                   placeholder="Tìm mã coupon, mô tả..." th:value="${keyword}">
                            <select name="status" class="filter-select">
                                <option value="">Tất cả trạng thái</option>
                                <option value="active"   th:selected="${status == 'active'}">Hoạt động</option>
                                <option value="inactive" th:selected="${status == 'inactive'}">Vô hiệu</option>
                            </select>
                            <button type="submit" class="btn btn-outline btn-sm">🔍 Tìm</button>
                            <a th:href="@{/admin/coupons}" class="btn btn-outline btn-sm">↺ Đặt lại</a>
                        </form>
                    </div>

                    <div class="table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Mã coupon</th>
                                    <th>Mô tả</th>
                                    <th>Loại</th>
                                    <th>Giá trị</th>
                                    <th>Đơn tối thiểu</th>
                                    <th>Đã dùng / Giới hạn</th>
                                    <th>Hết hạn</th>
                                    <th>Trạng thái</th>
                                    <th style="text-align:center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${coupons.empty}">
                                    <td colspan="9" style="text-align:center;color:#aaa;padding:30px">Không có coupon nào</td>
                                </tr>
                                <tr th:each="c : ${coupons}">
                                    <td><code style="font-size:13px;font-weight:600;color:#1a73e8" th:text="${c.code}">CODE</code></td>
                                    <td th:text="${c.description != null ? c.description : '-'}">-</td>
                                    <td>
                                        <span th:if="${c.discountType == 'percent'}" class="badge badge-info">% Phần trăm</span>
                                        <span th:if="${c.discountType == 'fixed'}"   class="badge badge-secondary">₫ Cố định</span>
                                    </td>
                                    <td>
                                        <strong th:if="${c.discountType == 'percent'}" th:text="${c.discountValue + '%'}">10%</strong>
                                        <strong th:if="${c.discountType == 'fixed'}"
                                                th:text="${#numbers.formatDecimal(c.discountValue, 0, 'COMMA', 0, 'POINT') + ' ₫'}">10,000 ₫</strong>
                                    </td>
                                    <td th:text="${c.minOrderAmount != null and c.minOrderAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0 ? #numbers.formatDecimal(c.minOrderAmount, 0, 'COMMA', 0, 'POINT') + ' ₫' : '-'}">-</td>
                                    <td>
                                        <span th:text="${c.usedCount != null ? c.usedCount : 0}">0</span>
                                        <span> / </span>
                                        <span th:text="${c.usageLimit != null ? c.usageLimit : '∞'}">∞</span>
                                    </td>
                                    <td>
                                        <span th:if="${c.endDate != null}" th:text="${#temporals.format(c.endDate, 'dd/MM/yyyy')}" th:classappend="${c.expired} ? 'text-danger'"></span>
                                        <span th:unless="${c.endDate != null}" style="color:#aaa">-</span>
                                    </td>
                                    <td>
                                        <span th:if="${c.status == 'active'}"   class="badge badge-success">Hoạt động</span>
                                        <span th:if="${c.status == 'inactive'}" class="badge badge-secondary">Vô hiệu</span>
                                        <span th:if="${c.expired}"              class="badge badge-danger" style="margin-left:4px">Hết hạn</span>
                                    </td>
                                    <td style="text-align:center;white-space:nowrap">
                                        <a th:href="@{'/admin/coupons/edit/' + ${c.id}}" class="btn btn-warning btn-sm">✏ Sửa</a>
                                        <form th:action="@{'/admin/coupons/toggle/' + ${c.id}}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-outline btn-sm"
                                                    th:text="${c.status == 'active'} ? '🔒 Khóa' : '🔓 Mở'">Toggle</button>
                                        </form>
                                        <form th:action="@{'/admin/coupons/delete/' + ${c.id}}" method="post" style="display:inline"
                                              onsubmit="return confirm('Xóa coupon này?')">
                                            <button type="submit" class="btn btn-danger btn-sm">🗑 Xóa</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="pagination-wrap" th:if="${coupons.totalPages > 1}">
                    <div th:replace="~{fragments/layout :: pagination(${coupons}, '/admin/coupons')}"></div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
