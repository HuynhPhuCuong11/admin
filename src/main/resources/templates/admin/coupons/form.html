<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Coupon</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card" style="max-width:700px">
                <div class="card-header">
                    <span class="card-title" th:text="${pageTitle}">Coupon</span>
                    <a th:href="@{/admin/coupons}" class="btn btn-outline btn-sm">← Quay lại</a>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/coupons/save}" method="post">
                        <input type="hidden" th:name="id" th:value="${coupon.id}">
                        <input type="hidden" th:name="usedCount" th:value="${coupon.usedCount != null ? coupon.usedCount : 0}">

                        <div class="form-grid">
                            <div class="form-group full">
                                <label class="form-label">Mã coupon <span style="color:red">*</span></label>
                                <input type="text" name="code" class="form-control"
                                       th:value="${coupon.code}" placeholder="VD: SUMMER20"
                                       required style="text-transform:uppercase">
                                <div th:if="${#fields.hasErrors('code')}" class="text-danger"
                                     th:errors="*{code}"></div>
                            </div>

                            <div class="form-group full">
                                <label class="form-label">Mô tả</label>
                                <textarea name="description" class="form-control" rows="2"
                                          th:text="${coupon.description}" placeholder="Mô tả về coupon..."></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Loại giảm giá <span style="color:red">*</span></label>
                                <select name="discountType" class="form-control" required>
                                    <option value="percent" th:selected="${coupon.discountType == 'percent' or coupon.discountType == null}">% Phần trăm</option>
                                    <option value="fixed"   th:selected="${coupon.discountType == 'fixed'}">₫ Số tiền cố định</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Giá trị giảm <span style="color:red">*</span></label>
                                <input type="number" name="discountValue" class="form-control"
                                       th:value="${coupon.discountValue}" min="0" step="0.01"
                                       placeholder="VD: 10 (%) hoặc 50000 (₫)" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Đơn hàng tối thiểu (₫)</label>
                                <input type="number" name="minOrderAmount" class="form-control"
                                       th:value="${coupon.minOrderAmount}" min="0" step="1000"
                                       placeholder="0 = không giới hạn">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Giảm tối đa (₫)</label>
                                <input type="number" name="maxDiscountAmount" class="form-control"
                                       th:value="${coupon.maxDiscountAmount}" min="0" step="1000"
                                       placeholder="Để trống = không giới hạn">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Giới hạn sử dụng</label>
                                <input type="number" name="usageLimit" class="form-control"
                                       th:value="${coupon.usageLimit}" min="1"
                                       placeholder="Để trống = không giới hạn">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-control">
                                    <option value="active"   th:selected="${coupon.status == 'active' or coupon.status == null}">Hoạt động</option>
                                    <option value="inactive" th:selected="${coupon.status == 'inactive'}">Vô hiệu hóa</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Ngày bắt đầu</label>
                                <input type="datetime-local" name="startDate" class="form-control"
                                       th:value="${coupon.startDate != null ? #temporals.format(coupon.startDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Ngày hết hạn</label>
                                <input type="datetime-local" name="endDate" class="form-control"
                                       th:value="${coupon.endDate != null ? #temporals.format(coupon.endDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
                            </div>
                        </div>

                        <div style="margin-top:20px;display:flex;gap:10px">
                            <button type="submit" class="btn btn-primary">💾 Lưu</button>
                            <a th:href="@{/admin/coupons}" class="btn btn-outline">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
