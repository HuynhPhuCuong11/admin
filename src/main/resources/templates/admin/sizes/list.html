<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Kích cỡ - Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
<div class="wrapper">
  <div th:replace="~{fragments/layout :: sidebar}"></div>
  <div class="main" id="mainContent">
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/layout :: alerts}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start">
        <!-- Danh sách -->
        <div class="card">
          <div class="card-header"><span class="card-title">Danh sách kích cỡ</span></div>
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>#</th><th>Tên</th><th>Phụ phí (₫)</th><th>Thao tác</th></tr></thead>
              <tbody>
              <tr th:each="s,i:${sizes}">
                <td th:text="${i.index+1}"></td>
                <td><span style="font-weight:600;font-size:15px" th:text="${s.name}"></span></td>
                <td th:text="${#numbers.formatDecimal(s.priceModifier,0,'COMMA',0,'POINT')}+'₫'">0₫</td>
                <td>
                  <form th:action="@{'/admin/sizes/delete/'+${s.id}}" method="post" onsubmit="return confirm('Xóa size này?')">
                    <button type="submit" class="btn btn-sm btn-danger">🗑 Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${sizes.isEmpty()}"><td colspan="4" style="text-align:center;padding:30px;color:var(--muted)">Chưa có size nào</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <!-- Form thêm -->
        <div class="card">
          <div class="card-header"><span class="card-title">Thêm kích cỡ mới</span></div>
          <div class="card-body">
            <form th:action="@{/admin/sizes/save}" method="post">
              <input type="hidden" th:name="id" th:value="${newSize.id}">
              <div class="form-group" style="margin-bottom:14px">
                <label class="form-label">Tên size *</label>
                <input type="text" name="name" class="form-control" placeholder="VD: M, L, XL" required>
              </div>
              <div class="form-group" style="margin-bottom:20px">
                <label class="form-label">Phụ phí (₫)</label>
                <input type="number" name="priceModifier" class="form-control" value="0" min="0" step="1000">
                <span class="form-hint">Phụ phí cộng thêm so với giá cơ bản</span>
              </div>
              <button type="submit" class="btn btn-primary">💾 Thêm size</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/admin.js}"></script>
</body></html>
