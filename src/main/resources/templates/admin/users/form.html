<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Người dùng</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card" style="max-width:600px">
                <div class="card-header">
                    <span class="card-title" th:text="${pageTitle}">Người dùng</span>
                    <a th:href="@{/admin/users}" class="btn btn-outline btn-sm">← Quay lại</a>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/users/save}" method="post">
                        <input type="hidden" th:name="id" th:value="${user.id}">

                        <div class="form-grid">
                            <div class="form-group full">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" name="fullName" class="form-control"
                                       th:value="${user.fullName}" placeholder="Nguyễn Văn A">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Email *</label>
                                <input type="email" name="email" class="form-control"
                                       th:value="${user.email}" required placeholder="user@email.com">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" name="phone" class="form-control"
                                       th:value="${user.phone}" placeholder="0901234567">
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Mật khẩu mới
                                    <span style="font-size:11px;color:var(--text-muted)">(để trống = giữ nguyên)</span>
                                </label>
                                <input type="password" name="rawPassword" class="form-control"
                                       placeholder="••••••••" autocomplete="new-password">
                            </div>

                            <div class="form-group">
                                <label class="form-label">Vai trò</label>
                                <select name="roles" class="form-control">
                                    <option value="customer" th:selected="${user.roles == 'customer' or user.roles == null}">Khách hàng</option>
                                    <option value="staff"    th:selected="${user.roles == 'staff'}">Nhân viên</option>
                                    <option value="admin"    th:selected="${user.roles == 'admin'}">Admin</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-control">
                                    <option value="active"   th:selected="${user.status == 'active' or user.status == null}">Hoạt động</option>
                                    <option value="inactive" th:selected="${user.status == 'inactive'}">Ngừng hoạt động</option>
                                    <option value="banned"   th:selected="${user.status == 'banned'}">Đã cấm</option>
                                </select>
                            </div>
                        </div>

                        <div style="display:flex;gap:12px;margin-top:24px">
                            <button type="submit" class="btn btn-primary">💾 Lưu</button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">↩ Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
