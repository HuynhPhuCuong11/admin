<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${pageTitle}+' - Admin'">Sản phẩm</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
<div class="wrapper">
  <div th:replace="~{fragments/layout :: sidebar}"></div>
  <div class="main" id="mainContent">
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/layout :: alerts}"></div>
      <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:name="id" th:value="${product.id}">
        <!-- ✅ FIX: giữ lại tên ảnh cũ khi không upload ảnh mới -->
        <input type="hidden" th:name="defaultImage" th:value="${product.defaultImage}">
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:22px;align-items:start">

          <!-- LEFT -->
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title">Thông tin sản phẩm</span></div>
              <div class="card-body">
                <div class="form-grid">
                  <div class="form-group full">
                    <label class="form-label">Tên sản phẩm *</label>
                    <input id="pName" type="text" name="name" class="form-control" th:value="${product.name}" required
                           placeholder="Nhập tên sản phẩm...">
                  </div>
                  <div class="form-group full">
                    <label class="form-label">Slug</label>
                    <input id="pSlug" type="text" name="slug" class="form-control" th:value="${product.slug}" placeholder="tu-dong-tao-tu-ten">
                  </div>
                  <div class="form-group full">
                    <label class="form-label">Mô tả</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Mô tả sản phẩm..." th:text="${product.description}"></textarea>
                  </div>
                </div>
              </div>
            </div>

            <!-- Variants -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">Biến thể theo size</span>
                <button type="button" class="btn btn-sm btn-outline" id="addVariantBtn">➕ Thêm size</button>
              </div>
              <div class="card-body">
                <div style="overflow-x:auto">
                  <table class="var-tbl">
                    <thead><tr><th>Size</th><th>Giá (₫)</th><th>SKU</th><th>Còn hàng</th><th></th></tr></thead>
                    <tbody id="variantBody">
                    <tr th:each="v:${variants}">
                      <td>
                        <select name="vSizeId" class="form-control">
                          <option th:each="s:${sizes}" th:value="${s.id}" th:text="${s.name}" th:selected="${s.id==v.sizeId}"></option>
                        </select>
                      </td>
                      <td><input type="number" name="vPrice" th:value="${v.price}" min="0" step="1000"></td>
                      <td><input type="text" name="vSku" th:value="${v.sku}" placeholder="SKU..."></td>
                      <td style="text-align:center"><input type="checkbox" name="vInStock" th:checked="${v.inStock}"></td>
                      <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove()">✕</button></td>
                    </tr>
                    </tbody>
                  </table>
                  <p id="no-variant-msg" th:if="${variants.isEmpty()}" style="text-align:center;color:var(--muted);padding:16px;font-size:13px">
                    Chưa có biến thể. Nhấn "Thêm size" để bắt đầu.
                  </p>
                </div>
              </div>
            </div>
          </div>

          <!-- RIGHT -->
          <div>
            <div class="card">
              <div class="card-header"><span class="card-title">Phân loại & Trạng thái</span></div>
              <div class="card-body">
                <div class="form-group" style="margin-bottom:14px">
                  <label class="form-label">Danh mục</label>
                  <select name="categoryId" class="form-control">
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${c.id==product.categoryId}"></option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:14px">
                  <label class="form-label">Trạng thái</label>
                  <select name="status" class="form-control">
                    <option value="published" th:selected="${product.status=='published'}">Đang bán</option>
                    <option value="draft"     th:selected="${product.status=='draft'}">Nháp</option>
                    <option value="archived"  th:selected="${product.status=='archived'}">Lưu trữ</option>
                  </select>
                </div>
                <div class="form-check">
                  <input type="checkbox" name="isFeatured" id="isFeatured" th:checked="${product.isFeatured}">
                  <label for="isFeatured" class="form-label" style="margin:0">Sản phẩm nổi bật ⭐</label>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header"><span class="card-title">Ảnh sản phẩm</span></div>
              <div class="card-body">
                <div th:if="${product.defaultImage!=null}" style="margin-bottom:12px;text-align:center">
                  <img th:src="@{'/images/'+${product.defaultImage}}"
                       style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border)">
                </div>
                <div class="form-group">
                  <label class="form-label">Upload ảnh</label>
                  <input type="file" name="imageFile" class="form-control" accept="image/*"
                         onchange="previewImage(this,'imgPrev')">
                </div>
                <img id="imgPrev" style="display:none;max-width:100%;margin-top:10px;border-radius:8px">
              </div>
            </div>

            <div class="card">
              <div class="card-header"><span class="card-title">Flash Sale</span></div>
              <div class="card-body">
                <div class="form-group" style="margin-bottom:12px">
                  <label class="form-label">Loại giảm giá</label>
                  <select name="discountType" class="form-control">
                    <option value="">Không có</option>
                    <option value="percent" th:selected="${product.discountType=='percent'}">Phần trăm (%)</option>
                    <option value="fixed"   th:selected="${product.discountType=='fixed'}">Số tiền cố định</option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:12px">
                  <label class="form-label">Giá trị</label>
                  <input type="number" name="discountValue" class="form-control" th:value="${product.discountValue}" min="0">
                </div>
                <div class="form-grid" style="gap:10px">
                  <div class="form-group">
                    <label class="form-label">Từ ngày</label>
                    <input type="datetime-local" name="discountStartDate" class="form-control"
                           th:value="${product.discountStartDate!=null?#temporals.format(product.discountStartDate,'yyyy-MM-dd''T''HH:mm'):''}">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Đến ngày</label>
                    <input type="datetime-local" name="discountEndDate" class="form-control"
                           th:value="${product.discountEndDate!=null?#temporals.format(product.discountEndDate,'yyyy-MM-dd''T''HH:mm'):''}">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:12px;margin-top:4px">
          <button type="submit" class="btn btn-primary">💾 Lưu sản phẩm</button>
          <a th:href="@{/admin/products}" class="btn btn-secondary">↩ Quay lại</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script th:src="@{/js/admin.js}"></script>
<script th:inline="javascript">
  const sizeOpts = /*[[${sizes}]]*/ [];
  document.getElementById('addVariantBtn').onclick = () => addVariantRow(sizeOpts);
  bindSlugAuto('pName','pSlug');
</script>
</body>
</html>
