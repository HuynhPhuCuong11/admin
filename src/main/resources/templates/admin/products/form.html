<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="id" th:value="${product.id}">

                <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;align-items:start">

                    <!-- Left column -->
                    <div>
                        <div class="card">
                            <div class="card-header"><span class="card-title">Thông tin sản phẩm</span></div>
                            <div class="card-body">
                                <div class="form-grid">
                                    <div class="form-group full">
                                        <label class="form-label">Tên sản phẩm *</label>
                                        <input type="text" name="name" class="form-control"
                                               th:value="${product.name}" required
                                               placeholder="Nhập tên sản phẩm..."
                                               oninput="autoSlug(this.value)">
                                        <span class="invalid-feedback"
                                              th:if="${#fields.hasErrors('name')}"
                                              th:errors="*{name}"></span>
                                    </div>
                                    <div class="form-group full">
                                        <label class="form-label">Slug (URL)</label>
                                        <input type="text" name="slug" id="slugInput" class="form-control"
                                               th:value="${product.slug}"
                                               placeholder="tu-dong-tao-tu-ten...">
                                    </div>
                                    <div class="form-group full">
                                        <label class="form-label">Mô tả</label>
                                        <textarea name="description" class="form-control"
                                                  rows="4" placeholder="Mô tả sản phẩm..."
                                                  th:text="${product.description}"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Variants -->
                        <div class="card">
                            <div class="card-header">
                                <span class="card-title">Biến thể theo size</span>
                                <button type="button" class="btn btn-sm btn-outline" onclick="addVariantRow()">➕ Thêm size</button>
                            </div>
                            <div class="card-body">
                                <div class="variant-table-wrap">
                                    <table class="variant-table" id="variantTable">
                                        <thead>
                                        <tr>
                                            <th>Size</th>
                                            <th>Giá (₫)</th>
                                            <th>SKU</th>
                                            <th>Còn hàng</th>
                                            <th></th>
                                        </tr>
                                        </thead>
                                        <tbody id="variantBody">
                                        <tr th:each="v, stat : ${variants}" th:if="${variants != null}">
                                            <td>
                                                <select name="variantSizeId" class="form-control">
                                                    <option th:each="s : ${sizes}"
                                                            th:value="${s.id}"
                                                            th:text="${s.name}"
                                                            th:selected="${s.id == v.sizeId}"></option>
                                                </select>
                                            </td>
                                            <td><input type="number" name="variantPrice"
                                                       th:value="${v.price}" min="0" step="1000"></td>
                                            <td><input type="text" name="variantSku"
                                                       th:value="${v.sku}" placeholder="SKU..."></td>
                                            <td style="text-align:center">
                                                <input type="checkbox" th:name="'inStock_' + ${stat.index}"
                                                       th:checked="${v.inStock}">
                                            </td>
                                            <td><button type="button" class="btn btn-sm btn-danger"
                                                        onclick="this.closest('tr').remove()">✕</button></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div th:if="${variants == null or variants.isEmpty()}"
                                     id="noVariantMsg"
                                     style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">
                                    Chưa có biến thể. Nhấn "Thêm size" để bắt đầu.
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right column -->
                    <div>
                        <div class="card">
                            <div class="card-header"><span class="card-title">Phân loại & Trạng thái</span></div>
                            <div class="card-body">
                                <div class="form-group" style="margin-bottom:16px">
                                    <label class="form-label">Danh mục</label>
                                    <select name="categoryId" class="form-control">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.id}"
                                                th:text="${c.name}"
                                                th:selected="${c.id == product.categoryId}"></option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-bottom:16px">
                                    <label class="form-label">Trạng thái</label>
                                    <select name="status" class="form-control">
                                        <option value="published" th:selected="${product.status == 'published'}">Đang bán</option>
                                        <option value="draft"     th:selected="${product.status == 'draft'}">Nháp</option>
                                        <option value="archived"  th:selected="${product.status == 'archived'}">Lưu trữ</option>
                                    </select>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" name="isFeatured" id="isFeatured"
                                           th:checked="${product.isFeatured}">
                                    <label for="isFeatured" class="form-label" style="margin:0">Sản phẩm nổi bật ⭐</label>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header"><span class="card-title">Ảnh sản phẩm</span></div>
                            <div class="card-body">
                                <div th:if="${product.defaultImage != null}" style="margin-bottom:12px;text-align:center">
                                    <img th:src="@{'/images/products/' + ${product.defaultImage}}"
                                         style="max-width:100%;max-height:180px;border-radius:8px;border:1px solid var(--border)">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Upload ảnh mới</label>
                                    <input type="file" name="imageFile" class="form-control"
                                           accept="image/*" onchange="previewImage(this)">
                                </div>
                                <img id="imgPreview" style="display:none;max-width:100%;margin-top:10px;border-radius:8px">
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header"><span class="card-title">Flash Sale</span></div>
                            <div class="card-body">
                                <div class="form-group" style="margin-bottom:12px">
                                    <label class="form-label">Loại giảm giá</label>
                                    <select name="discountType" class="form-control">
                                        <option value="">Không có</option>
                                        <option value="percent" th:selected="${product.discountType == 'percent'}">Phần trăm (%)</option>
                                        <option value="fixed"   th:selected="${product.discountType == 'fixed'}">Số tiền cố định</option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-bottom:12px">
                                    <label class="form-label">Giá trị giảm</label>
                                    <input type="number" name="discountValue" class="form-control"
                                           th:value="${product.discountValue}" min="0">
                                </div>
                                <div class="form-group" style="margin-bottom:12px">
                                    <label class="form-label">Từ ngày</label>
                                    <input type="datetime-local" name="discountStartDate" class="form-control"
                                           th:value="${product.discountStartDate != null ? #temporals.format(product.discountStartDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Đến ngày</label>
                                    <input type="datetime-local" name="discountEndDate" class="form-control"
                                           th:value="${product.discountEndDate != null ? #temporals.format(product.discountEndDate, 'yyyy-MM-dd''T''HH:mm') : ''}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Form actions -->
                <div style="display:flex;gap:12px;margin-top:4px">
                    <button type="submit" class="btn btn-primary">💾 Lưu sản phẩm</button>
                    <a th:href="@{/admin/products}" class="btn btn-secondary">↩ Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/admin.js}"></script>
<script>
    // Size options JSON for dynamic variant rows
    const sizeOptions = /*[[${sizes}]]*/ [];

    function addVariantRow() {
        document.getElementById('noVariantMsg') && (document.getElementById('noVariantMsg').style.display = 'none');
        const tbody = document.getElementById('variantBody');
        const idx = tbody.rows.length;
        const opts = sizeOptions.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        const row = `<tr>
            <td><select name="variantSizeId" class="form-control">${opts}</select></td>
            <td><input type="number" name="variantPrice" value="0" min="0" step="1000"></td>
            <td><input type="text" name="variantSku" placeholder="SKU..."></td>
            <td style="text-align:center"><input type="checkbox" checked></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="this.closest('tr').remove()">✕</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
    }

    function autoSlug(val) {
        const slug = val.toLowerCase()
            .replace(/[àáạảãâầấậẩẫăằắặẳẵ]/g,'a')
            .replace(/[èéẹẻẽêềếệểễ]/g,'e')
            .replace(/[ìíịỉĩ]/g,'i')
            .replace(/[òóọỏõôồốộổỗơờớợởỡ]/g,'o')
            .replace(/[ùúụủũưừứựửữ]/g,'u')
            .replace(/[ỳýỵỷỹ]/g,'y')
            .replace(/đ/g,'d')
            .replace(/[^a-z0-9\s-]/g,'')
            .replace(/\s+/g,'-')
            .replace(/-+/g,'-')
            .replace(/^-|-$/g,'');
        document.getElementById('slugInput').value = slug;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('imgPreview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
