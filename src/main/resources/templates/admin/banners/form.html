<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${pageTitle}+' - Admin'">Banner</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
<div class="wrapper">
  <div th:replace="~{fragments/layout :: sidebar}"></div>
  <div class="main" id="mainContent">
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/layout :: alerts}"></div>
      <div class="card" style="max-width:600px">
        <div class="card-header">
          <span class="card-title" th:text="${pageTitle}">Banner</span>
          <a th:href="@{/admin/banners}" class="btn btn-outline btn-sm">← Quay lại</a>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/banners/save}" method="post">
            <input type="hidden" th:name="id" th:value="${banner.id}">
            <div class="form-grid">
              <div class="form-group full">
                <label class="form-label">Tiêu đề banner *</label>
                <input type="text" name="title" class="form-control" th:value="${banner.title}" required placeholder="Nhập tiêu đề banner...">
              </div>
              <div class="form-group full">
                <label class="form-label">URL hình ảnh *</label>
                <input type="text" name="imageUrl" class="form-control" th:value="${banner.imageUrl}"
                       required placeholder="https://... hoặc /images/banner.jpg"
                       oninput="updatePreview(this.value)">
                <span class="form-hint">Nhập URL đầy đủ hoặc đường dẫn tương đối</span>
              </div>
              <!-- Preview -->
              <div class="form-group full" id="previewWrap" style="display:none">
                <label class="form-label">Xem trước</label>
                <img id="bannerPreview" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border)">
              </div>
              <div class="form-group full">
                <label class="form-label">URL liên kết</label>
                <input type="text" name="linkUrl" class="form-control" th:value="${banner.linkUrl}" placeholder="https://...">
              </div>
              <div class="form-group">
                <label class="form-label">Vị trí hiển thị</label>
                <select name="position" class="form-control">
                  <option value="">-- Chọn vị trí --</option>
                  <option value="home_top"    th:selected="${banner.position=='home_top'}">Trang chủ - Trên</option>
                  <option value="home_middle" th:selected="${banner.position=='home_middle'}">Trang chủ - Giữa</option>
                  <option value="sidebar"     th:selected="${banner.position=='sidebar'}">Sidebar</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Thứ tự sắp xếp</label>
                <input type="number" name="sortOrder" class="form-control" th:value="${banner.sortOrder}" min="0">
              </div>
              <div class="form-group full">
                <div class="form-check">
                  <input type="checkbox" name="active" id="bannerActive"
                         th:checked="${banner.active==null or banner.active}">
                  <label for="bannerActive" class="form-label" style="margin:0">Hiển thị banner</label>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:12px;margin-top:20px">
              <button type="submit" class="btn btn-primary">💾 Lưu banner</button>
              <a th:href="@{/admin/banners}" class="btn btn-secondary">↩ Quay lại</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/admin.js}"></script>
<script>
  function updatePreview(url) {
    const wrap = document.getElementById('previewWrap');
    const img  = document.getElementById('bannerPreview');
    if (url && url.trim()) {
      img.src = url.trim();
      wrap.style.display = 'block';
      img.onerror = () => { wrap.style.display = 'none'; };
    } else {
      wrap.style.display = 'none';
    }
  }
  // Show preview on load if editing
  window.addEventListener('DOMContentLoaded', () => {
    const urlInput = document.querySelector('input[name="imageUrl"]');
    if (urlInput?.value) updatePreview(urlInput.value);
  });
</script>
</body>
</html>
