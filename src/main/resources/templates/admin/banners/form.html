<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Banner</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card" style="max-width:600px">
                <div class="card-header">
                    <span class="card-title" th:text="${pageTitle}">Banner</span>
                    <a th:href="@{/admin/banners}" class="btn btn-outline btn-sm">← Quay lại</a>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/banners/save}" method="post">
                        <input type="hidden" th:name="id" th:value="${banner.id}">

                        <div class="form-group full">
                            <label class="form-label">Tiêu đề <span style="color:red">*</span></label>
                            <input type="text" name="title" class="form-control"
                                   th:value="${banner.title}" placeholder="Tiêu đề banner" required>
                        </div>

                        <div class="form-group full">
                            <label class="form-label">URL hình ảnh <span style="color:red">*</span></label>
                            <input type="text" name="imageUrl" class="form-control"
                                   th:value="${banner.imageUrl}" placeholder="/images/banner1.png" required>
                            <small style="color:#888">Đường dẫn đến file ảnh (tuyệt đối hoặc tương đối từ /static)</small>
                        </div>

                        <div class="form-group full">
                            <label class="form-label">URL liên kết</label>
                            <input type="text" name="linkUrl" class="form-control"
                                   th:value="${banner.linkUrl}" placeholder="https://... hoặc /products">
                        </div>

                        <div class="form-group full">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="2"
                                      th:text="${banner.description}" placeholder="Mô tả ngắn..."></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Thứ tự hiển thị</label>
                                <input type="number" name="sortOrder" class="form-control"
                                       th:value="${banner.sortOrder != null ? banner.sortOrder : 0}" min="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Trạng thái</label>
                                <select name="status" class="form-control">
                                    <option value="active"   th:selected="${banner.status == 'active' or banner.status == null}">Hiển thị</option>
                                    <option value="inactive" th:selected="${banner.status == 'inactive'}">Ẩn</option>
                                </select>
                            </div>
                        </div>

                        <div style="margin-top:20px;display:flex;gap:10px">
                            <button type="submit" class="btn btn-primary">💾 Lưu</button>
                            <a th:href="@{/admin/banners}" class="btn btn-outline">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
