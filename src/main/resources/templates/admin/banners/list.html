<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Admin'">Banner</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content" id="mainContent">
        <div th:replace="~{fragments/layout :: topbar}"></div>
        <div class="page-body">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Danh sách Banner</span>
                    <a th:href="@{/admin/banners/create}" class="btn btn-primary btn-sm">+ Thêm mới</a>
                </div>
                <div class="card-body">
                    <div class="table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Hình ảnh</th>
                                    <th>Tiêu đề</th>
                                    <th>Mô tả</th>
                                    <th>Link</th>
                                    <th>Thứ tự</th>
                                    <th>Trạng thái</th>
                                    <th style="text-align:center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${banners.empty}">
                                    <td colspan="7" style="text-align:center;color:#aaa;padding:30px">Chưa có banner nào</td>
                                </tr>
                                <tr th:each="b : ${banners}">
                                    <td>
                                        <img th:src="${b.imageUrl}" th:alt="${b.title}"
                                             style="width:80px;height:45px;object-fit:cover;border-radius:4px;border:1px solid #eee"
                                             onerror="this.style.display='none'">
                                    </td>
                                    <td th:text="${b.title}">Tiêu đề</td>
                                    <td th:text="${b.description != null ? (b.description.length() > 40 ? b.description.substring(0,40) + '...' : b.description) : '-'}">-</td>
                                    <td>
                                        <a th:if="${b.linkUrl != null}" th:href="${b.linkUrl}" target="_blank"
                                           style="color:#1a73e8;font-size:12px" th:text="${b.linkUrl.length() > 30 ? b.linkUrl.substring(0,30) + '...' : b.linkUrl}">Link</a>
                                        <span th:unless="${b.linkUrl != null}" style="color:#aaa">-</span>
                                    </td>
                                    <td th:text="${b.sortOrder}">0</td>
                                    <td>
                                        <span th:if="${b.status == 'active'}"   class="badge badge-success">Hiển thị</span>
                                        <span th:if="${b.status == 'inactive'}" class="badge badge-secondary">Ẩn</span>
                                    </td>
                                    <td style="text-align:center;white-space:nowrap">
                                        <a th:href="@{'/admin/banners/edit/' + ${b.id}}" class="btn btn-warning btn-sm">✏ Sửa</a>
                                        <form th:action="@{'/admin/banners/toggle/' + ${b.id}}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-outline btn-sm"
                                                    th:text="${b.status == 'active'} ? '🙈 Ẩn' : '👁 Hiện'">Toggle</button>
                                        </form>
                                        <form th:action="@{'/admin/banners/delete/' + ${b.id}}" method="post" style="display:inline"
                                              onsubmit="return confirm('Xóa banner này?')">
                                            <button type="submit" class="btn btn-danger btn-sm">🗑 Xóa</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
