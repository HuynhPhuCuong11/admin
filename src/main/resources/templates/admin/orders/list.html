<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Đơn hàng - Admin</title><link rel="stylesheet" th:href="@{/css/admin.css}"></head>
<body>
<div class="wrapper">
  <div th:replace="~{fragments/layout :: sidebar}"></div>
  <div class="main" id="mainContent">
    <div th:replace="~{fragments/layout :: topbar}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/layout :: alerts}"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">Danh sách đơn hàng</span></div>
        <div class="card-body" style="padding-bottom:0">
          <div class="filter-bar">
            <form method="get" th:action="@{/admin/orders}">
              <input type="text" name="keyword" class="inp-search" placeholder="Mã đơn, tên, SĐT..." th:value="${keyword}">
              <select name="orderStatus" class="inp-select">
                <option value="">Tất cả trạng thái</option>
                <option value="pending"    th:selected="${orderStatus=='pending'}">Chờ xác nhận</option>
                <option value="confirmed"  th:selected="${orderStatus=='confirmed'}">Đã xác nhận</option>
                <option value="processing" th:selected="${orderStatus=='processing'}">Đang xử lý</option>
                <option value="shipped"    th:selected="${orderStatus=='shipped'}">Đang giao</option>
                <option value="delivered"  th:selected="${orderStatus=='delivered'}">Đã giao</option>
                <option value="cancelled"  th:selected="${orderStatus=='cancelled'}">Đã hủy</option>
              </select>
              <select name="payStatus" class="inp-select">
                <option value="">Tất cả thanh toán</option>
                <option value="pending" th:selected="${payStatus=='pending'}">Chưa TT</option>
                <option value="paid"    th:selected="${payStatus=='paid'}">Đã TT</option>
                <option value="failed"  th:selected="${payStatus=='failed'}">Thất bại</option>
              </select>
              <button type="submit" class="btn btn-secondary btn-sm">🔍</button>
              <a th:href="@{/admin/orders}" class="btn btn-outline btn-sm">↺</a>
            </form>
          </div>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>SĐT</th><th>Tổng tiền</th><th>Thanh toán</th><th>Trạng thái đơn</th><th>Ngày đặt</th><th></th></tr></thead>
            <tbody>
            <tr th:each="o:${orders.content}">
              <td><span style="font-weight:600;font-size:12px;color:var(--primary)" th:text="${o.orderNo}"></span></td>
              <td th:text="${o.customerName}"></td>
              <td th:text="${o.customerPhone}"></td>
              <td style="font-weight:600;color:var(--success)" th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')}+'₫'"></td>
              <td><span class="badge" th:classappend="'bg-'+${o.payStatus}"
                th:text="${o.payStatus=='paid'?'Đã TT':o.payStatus=='pending'?'Chưa TT':'Thất bại'}"></span></td>
              <td><span class="badge" th:classappend="'bg-'+${o.orderStatus}"
                th:text="${o.orderStatus=='pending'?'Chờ XN':o.orderStatus=='confirmed'?'Đã XN':o.orderStatus=='processing'?'Xử lý':o.orderStatus=='shipped'?'Đang giao':o.orderStatus=='delivered'?'Đã giao':'Đã hủy'}"></span></td>
              <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
              <td><a th:href="@{'/admin/orders/'+${o.id}}" class="btn btn-sm btn-primary">👁 Chi tiết</a></td>
            </tr>
            <tr th:if="${orders.content.isEmpty()}"><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Không có đơn hàng nào</td></tr>
            </tbody>
          </table>
        </div>
        <div th:replace="~{fragments/layout :: pagination(${orders},'/admin/orders')}"></div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/admin.js}"></script>
</body></html>
