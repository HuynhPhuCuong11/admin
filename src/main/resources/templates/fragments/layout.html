<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== SIDEBAR FRAGMENT ===== -->
<nav th:fragment="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <span class="logo-icon">🧋</span>
            <span class="logo-text">Trà Sữa Admin</span>
        </div>
    </div>

    <ul class="sidebar-menu">
        <li class="menu-label">Tổng quan</li>
        <li th:classappend="${activePage == 'dashboard'} ? 'active'">
            <a th:href="@{/admin/dashboard}">
                <i class="icon">📊</i><span>Dashboard</span>
            </a>
        </li>

        <li class="menu-label">Quản lý bán hàng</li>
        <li th:classappend="${activePage == 'orders'} ? 'active'">
            <a th:href="@{/admin/orders}">
                <i class="icon">🛒</i><span>Đơn hàng</span>
                <span class="badge badge-danger" id="pending-badge" style="display:none"></span>
            </a>
        </li>

        <li class="menu-label">Quản lý sản phẩm</li>
        <li th:classappend="${activePage == 'products'} ? 'active'">
            <a th:href="@{/admin/products}">
                <i class="icon">🍵</i><span>Sản phẩm</span>
            </a>
        </li>
        <li th:classappend="${activePage == 'categories'} ? 'active'">
            <a th:href="@{/admin/categories}">
                <i class="icon">📂</i><span>Danh mục</span>
            </a>
        </li>
        <li th:classappend="${activePage == 'toppings'} ? 'active'">
            <a th:href="@{/admin/toppings}">
                <i class="icon">🧆</i><span>Topping</span>
            </a>
        </li>

        <li class="menu-label">Quản lý hệ thống</li>
        <li th:classappend="${activePage == 'users'} ? 'active'">
            <a th:href="@{/admin/users}">
                <i class="icon">👥</i><span>Người dùng</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a th:href="@{/admin/logout}" class="logout-btn">
            <i class="icon">🚪</i><span>Đăng xuất</span>
        </a>
    </div>
</nav>

<!-- ===== TOPBAR FRAGMENT ===== -->
<header th:fragment="topbar" class="topbar">
    <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-title" th:text="${pageTitle}">Admin</h1>
    </div>
    <div class="topbar-right">
        <div class="admin-info">
            <span class="admin-avatar">👤</span>
            <span sec:authentication="name">Admin</span>
        </div>
    </div>
</header>

<!-- ===== ALERTS FRAGMENT ===== -->
<div th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible">
        <span th:text="${success}"></span>
        <button onclick="this.parentElement.remove()">✕</button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible">
        <span th:text="${error}"></span>
        <button onclick="this.parentElement.remove()">✕</button>
    </div>
</div>

<!-- ===== PAGINATION FRAGMENT ===== -->
<nav th:fragment="pagination(pageData, baseUrl)" class="pagination-wrap" th:if="${pageData.totalPages > 1}">
    <ul class="pagination">
        <li th:classappend="${pageData.first} ? 'disabled'">
            <a th:href="${baseUrl + '?page=' + (pageData.number - 1)}">«</a>
        </li>
        <li th:each="i : ${#numbers.sequence(0, pageData.totalPages - 1)}"
            th:classappend="${i == pageData.number} ? 'active'">
            <a th:href="${baseUrl + '?page=' + i}" th:text="${i + 1}">1</a>
        </li>
        <li th:classappend="${pageData.last} ? 'disabled'">
            <a th:href="${baseUrl + '?page=' + (pageData.number + 1)}">»</a>
        </li>
    </ul>
</nav>

</html>
