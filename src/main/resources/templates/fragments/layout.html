<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ═══ SIDEBAR ═══ -->
<nav th:fragment="sidebar" id="sidebar">
  <div class="sb-logo">
    <span class="sb-logo-icon">🧋</span>
    <span class="sb-logo-text">Trà Sữa Admin</span>
  </div>
  <ul class="sb-menu">
    <li class="sb-section">Tổng quan</li>
    <li th:classappend="${activePage=='dashboard'}?'active':''">
      <a th:href="@{/admin/dashboard}"><span class="sb-icon">📊</span>Dashboard</a>
    </li>

    <li class="sb-section">Bán hàng</li>
    <li th:classappend="${activePage=='orders'}?'active':''">
      <a th:href="@{/admin/orders}"><span class="sb-icon">🛒</span>Đơn hàng</a>
    </li>
    <li th:classappend="${activePage=='coupons'}?'active':''">
      <a th:href="@{/admin/coupons}"><span class="sb-icon">🏷️</span>Mã giảm giá</a>
    </li>

    <li class="sb-section">Sản phẩm</li>
    <li th:classappend="${activePage=='products'}?'active':''">
      <a th:href="@{/admin/products}"><span class="sb-icon">🍵</span>Sản phẩm</a>
    </li>
    <li th:classappend="${activePage=='categories'}?'active':''">
      <a th:href="@{/admin/categories}"><span class="sb-icon">📂</span>Danh mục</a>
    </li>
    <li th:classappend="${activePage=='toppings'}?'active':''">
      <a th:href="@{/admin/toppings}"><span class="sb-icon">🧆</span>Topping</a>
    </li>
    <li th:classappend="${activePage=='sizes'}?'active':''">
      <a th:href="@{/admin/sizes}"><span class="sb-icon">📏</span>Kích cỡ</a>
    </li>

    <li class="sb-section">Nội dung</li>
    <li th:classappend="${activePage=='banners'}?'active':''">
      <a th:href="@{/admin/banners}"><span class="sb-icon">🖼️</span>Banner</a>
    </li>
    <li th:classappend="${activePage=='reviews'}?'active':''">
      <a th:href="@{/admin/reviews}">
        <span class="sb-icon">⭐</span>Đánh giá
        <span class="sb-badge" th:if="${pendingReviews!=null and pendingReviews>0}" th:text="${pendingReviews}"></span>
      </a>
    </li>

    <li class="sb-section">Hệ thống</li>
    <li th:classappend="${activePage=='users'}?'active':''">
      <a th:href="@{/admin/users}"><span class="sb-icon">👥</span>Người dùng</a>
    </li>
  </ul>
  <div class="sb-footer">
    <a th:href="@{/admin/logout}" class="sb-logout"><span class="sb-icon">🚪</span>Đăng xuất</a>
  </div>
</nav>

<!-- ═══ TOPBAR ═══ -->
<header th:fragment="topbar" class="topbar">
  <div class="topbar-l">
    <button class="sb-toggle" onclick="toggleSidebar()">☰</button>
    <h1 class="page-title" th:text="${pageTitle}">Admin</h1>
  </div>
  <div class="topbar-r">
    <div class="admin-chip">
      <span class="admin-avatar">👤</span>
      <span sec:authentication="name">Admin</span>
    </div>
  </div>
</header>

<!-- ═══ ALERTS ═══ -->
<div th:fragment="alerts">
  <div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
    <button class="alert-dismiss" onclick="this.parentElement.remove()">✕</button>
  </div>
  <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
    <button class="alert-dismiss" onclick="this.parentElement.remove()">✕</button>
  </div>
</div>

<!-- ═══ PAGINATION ═══ -->
<nav th:fragment="pagination(pg, url)" class="pager" th:if="${pg.totalPages > 1}">
  <a th:classappend="${pg.first}?'disabled':''"
     th:href="${url+'?page='+(pg.number-1)}">«</a>
  <th:block th:each="i : ${#numbers.sequence(0, pg.totalPages-1)}">
    <a th:classappend="${i==pg.number}?'active':''"
       th:href="${url+'?page='+i}"
       th:text="${i+1}">1</a>
  </th:block>
  <a th:classappend="${pg.last}?'disabled':''"
     th:href="${url+'?page='+(pg.number+1)}">»</a>
</nav>

</html>
